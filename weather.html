<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clima | Dashboard</title>
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
  <div class="page-shell">
    <header class="page-header">
      <div>
        <h1>Estación meteorológica</h1>
      </div>
      <nav class="page-nav">
        <a href="index.html" title="Dashboard"><i class="fa-solid fa-house"></i></a>
        <a href="clock.html" title="Reloj"><i class="fa-solid fa-clock"></i></a>
        <a href="password.html" title="Contraseña"><i class="fa-solid fa-lock"></i></a>
        <a href="links.html" title="Links"><i class="fa-solid fa-link"></i></a>
      </nav>
      <button id="theme-toggle" class="theme-toggle" type="button" title="Cambiar tema"><i class="fa-solid fa-sun"></i></button>
    </header>

    <main class="content single-card weather-page">
      <section class="card weather-card">
        <form id="weather-form" class="form-row">
          <label>
            Ciudad
            <input id="city-input" type="text" value="Madrid" placeholder="Escribe una ciudad" />
          </label>
          <button id="search-weather" type="submit"><i class="fa-solid fa-magnifying-glass"></i> Buscar clima</button>
        </form>

        <div id="weather-output" class="weather-output">
          <p class="muted">Introduce una ciudad y pulsa buscar.</p>
        </div>
      </section>
    </main>
  </div>

  <script src="js/background.js" defer></script>
  <script src="js/weather.js" defer></script>
</body>
</html>
