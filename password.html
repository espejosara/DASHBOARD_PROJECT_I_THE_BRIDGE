<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generador de contraseñas | Dashboard</title>
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="page-shell">
    <header class="page-header">
      <div>
        <h1>Generador de contraseñas</h1>
        <p>Crea contraseñas seguras con letras, números y símbolos.</p>
      </div>
      <nav class="page-nav">
        <a href="index.html">Dashboard</a>
        <a href="clock.html">Reloj</a>
        <a href="weather.html">Clima</a>
        <a href="links.html">Links</a>
      </nav>
    </header>

    <main class="content single-card password-page">
      <section class="card">
        <div class="form-row">
          <label>
            Longitud (12-50)
            <input id="password-length" type="number" min="12" max="50" value="16" />
          </label>
          <button id="generate-password" type="button">Generar contraseña</button>
        </div>

        <div class="password-result">
          <label>Contraseña generada</label>
          <output id="password-result">Haz clic en generar.</output>
        </div>
      </section>
    </main>
  </div>

  <script src="js/background.js" defer></script>
  <script src="js/password.js" defer></script>
</body>
</html>
