<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generador de contraseñas | Dashboard</title>
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
  <div class="page-shell">
    <header class="page-header">
      <div>
        <h1>Generador de contraseñas</h1>
        <p>Crea contraseñas seguras con letras, números y símbolos.</p>
      </div>
      <nav class="page-nav">
        <a href="index.html" title="Dashboard"><i class="fa-solid fa-house"></i></a>
        <a href="clock.html" title="Reloj"><i class="fa-solid fa-clock"></i></a>
        <a href="weather.html" title="Clima"><i class="fa-solid fa-cloud-sun"></i></a>
        <a href="links.html" title="Links"><i class="fa-solid fa-link"></i></a>
      </nav>
      <button id="theme-toggle" class="theme-toggle" type="button" title="Cambiar tema"><i class="fa-solid fa-sun"></i></button>
    </header>

    <main class="content single-card password-page">
      <section class="card">
        <div class="form-row">
          <label>
            Longitud (12-50)
            <input id="password-length" type="number" min="12" max="50" value="16" />
          </label>
          <button id="generate-password" type="button"><i class="fa-solid fa-bolt"></i> Generar contraseña</button>
        </div>

        <div class="password-result">
          <label>Contraseña generada</label>
          <output id="password-result">Haz clic en generar.</output>
        </div>
      </section>
    </main>
  </div>

  <script src="js/background.js" defer></script>
  <script src="js/password.js" defer></script>
</body>
</html>
