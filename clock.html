<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reloj digital | Dashboard</title>
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
  <div class="page-shell">
    <header class="page-header">
      <div>
        <h1>Reloj digital</h1>
      </div>
      <nav class="page-nav">
        <a href="index.html" title="Dashboard"><i class="fa-solid fa-house"></i></a>
        <a href="weather.html" title="Clima"><i class="fa-solid fa-cloud-sun"></i></a>
        <a href="password.html" title="Contraseña"><i class="fa-solid fa-lock"></i></a>
        <a href="links.html" title="Links"><i class="fa-solid fa-link"></i></a>
      </nav>
      <button id="theme-toggle" class="theme-toggle" type="button" title="Cambiar tema"><i class="fa-solid fa-sun"></i></button>
    </header>

    <main class="content single-card">
      <section class="card clock-card">
        <div class="clock-display">
          <p class="clock-intro">Hola, desarrollador. Son las:</p>  
          <span id="clock">00:00:00</span>
          <span id="date">DD/MM/AAAA</span>
          <div class="progress-container">
            <div id="day-progress-bar"></div>
          </div>
        </div>
        <p id="greeting">Cargando mensaje...</p>
      </section>
    </main>
  </div>

  <script src="js/background.js" defer></script>
  <script src="js/clock.js" defer></script>
</body>
</html>
