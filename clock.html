<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reloj digital | Dashboard</title>
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
  <div class="page-shell">
    <header class="page-header">
      <div>
        <h1>Reloj digital</h1>
      </div>
      <nav class="page-nav">
        <a href="index.html" title="Dashboard" aria-label="Ir al Dashboard"><i class="fa-solid fa-house" aria-hidden="true"></i></a>
        <a href="clock.html" title="Reloj" aria-label="Ir al Reloj" class="active"><i class="fa-solid fa-clock" aria-hidden="true"></i></a>
        <a href="weather.html" title="Clima" aria-label="Ir al Clima"><i class="fa-solid fa-cloud-sun" aria-hidden="true"></i></a>
        <a href="password.html" title="Contraseña" aria-label="Ir a Contraseñas"><i class="fa-solid fa-lock" aria-hidden="true"></i></a>
        <a href="links.html" title="Links" aria-label="Ir a Links"><i class="fa-solid fa-link" aria-hidden="true"></i></a>
      </nav>
    </header>

    <main class="content single-card">
      <section class="card clock-card">
        <div class="clock-display">
          <p class="clock-intro">Hola, desarrollador. Son las:</p>  
          <span id="clock">00:00:00</span>
          <span id="date">DD/MM/AAAA</span>
          <div class="progress-container">
            <div id="day-progress-bar"></div>
          </div>
        </div>
        <p id="greeting">Cargando mensaje...</p>
      </section>
    </main>
  </div>

  <script src="js/background.js" defer></script>
  <script src="js/clock.js" defer></script>
</body>
</html>
