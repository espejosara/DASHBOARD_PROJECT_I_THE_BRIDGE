<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Listado de links | Dashboard</title>
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
  <div class="page-shell">
    <header class="page-header">
      <div>
        <h1>Listado de links</h1>
      </div>
      <nav class="page-nav">
        <a href="index.html" title="Dashboard"><i class="fa-solid fa-house"></i></a>
        <a href="clock.html" title="Reloj"><i class="fa-solid fa-clock"></i></a>
        <a href="weather.html" title="Clima"><i class="fa-solid fa-cloud-sun"></i></a>
        <a href="password.html" title="Contraseña"><i class="fa-solid fa-lock"></i></a>
        <a href="links.html" title="Links" class="active"><i class="fa-solid fa-link"></i></a>
      </nav>
      <button id="theme-toggle" class="theme-toggle" type="button" title="Cambiar tema"><i class="fa-solid fa-sun"></i></button>
    </header>

    <main class="content single-card links-page">
      <section class="card">
        <form id="link-form" class="form-column">
          <label>
            Título
            <input id="link-title" type="text" placeholder="Título del enlace" required />
          </label>
          <label>
            URL
            <input id="link-url" type="url" placeholder="https://ejemplo.com" required />
          </label>
          <button id="add-link" type="submit"><i class="fa-solid fa-plus"></i> Añadir link</button>
        </form>

        <div class="links-list">
          <p id="empty-state" class="muted">No hay enlaces guardados todavía.</p>
          <ul id="links-list"></ul>
        </div>
      </section>
    </main>
  </div>

  <script src="js/background.js" defer></script>
  <script src="js/links.js" defer></script>
</body>
</html>
